name: Monthly AQI Data Refresh

on:
  schedule:
    # Run on the 1st of every month at 02:00 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tensorflow

      - name: Authenticate Google Earth Engine (Optional/Simulated)
        env:
          EE_SERVICE_ACCOUNT: ${{ secrets.EE_SERVICE_ACCOUNT }}
          EE_PRIVATE_KEY: ${{ secrets.EE_PRIVATE_KEY }}
        run: |
          echo "Simulating GEE auth if credentials present..."
          # python scripts/data_ingestion/gee_extractor.py

      - name: Run ML Pipeline & Generate Results
        run: |
          # This script handles preprocessing, model inference, and exporting to src/lib/model_results.json
          python scripts/objective_1/generate_results.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Data Refresh"
          git add src/lib/model_results.json
          
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated monthly AQI data refresh" && git push)
